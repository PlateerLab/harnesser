name: harnesser

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: harnesser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-harnesser}
      POSTGRES_DB: harnesser
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harnesser -d harnesser"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: ./apps/api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://harnesser:${POSTGRES_PASSWORD:-harnesser}@postgres:5432/harnesser
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-harnesser-dev-secret-change-me}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-harnesser-internal-change-me}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-4o-mini}
      AI_EVAL_MODEL: ${AI_EVAL_MODEL:-gpt-4o-mini}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  judge:
    build: ./apps/judge
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      API_BASE_URL: http://api:8000
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-harnesser-internal-change-me}
      JUDGE_CONCURRENCY: ${JUDGE_CONCURRENCY:-2}
    pids_limit: 1024
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build: ./apps/web
    restart: unless-stopped
    environment:
      API_URL: http://api:8000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
